<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Examer1</title>
  <style>
    :root {
      --bg:      #1e1e2e;
      --surface: #181825;
      --overlay: #313244;
      --border:  #45475a;
      --text:    #cdd6f4;
      --subtext: #585b70;
      --accent:  #fab387;
      --green:   #a6e3a1;
      --blue:    #89b4fa;
      --radius:  14px;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Malgun Gothic', 'Segoe UI', sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 60px 24px 80px;
      gap: 48px;
    }
    h1 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 2px;
      color: var(--accent);
    }
    .grid {
      display: flex;
      flex-wrap: wrap;
      gap: 24px;
      justify-content: center;
    }
    .app-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      width: 180px;
      padding: 32px 16px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
      text-decoration: none;
      color: var(--text);
      transition: border-color .2s, background .2s, transform .15s;
      cursor: pointer;
    }
    .app-card:hover {
      border-color: var(--accent);
      background: var(--overlay);
      transform: translateY(-3px);
    }
    .app-icon {
      font-size: 48px;
      line-height: 1;
    }
    .app-name {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
      text-align: center;
    }
    .app-desc {
      font-size: 12px;
      color: var(--subtext);
      text-align: center;
      line-height: 1.6;
    }
    /* Modal */
    .modal-backdrop {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,.6);
      z-index: 100;
      align-items: center;
      justify-content: center;
    }
    .modal-backdrop.open { display: flex; }
    .modal {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 32px 28px;
      width: 280px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      position: relative;
    }
    .modal h2 {
      font-size: 16px;
      font-weight: 700;
      color: var(--accent);
    }
    .modal a {
      color: var(--blue);
      text-decoration: none;
      font-size: 15px;
    }
    .modal a:hover { text-decoration: underline; }
    .modal-close {
      position: absolute;
      top: 10px; right: 14px;
      background: none;
      border: none;
      color: var(--subtext);
      font-size: 20px;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <h1>Examer1</h1>

  <div class="grid">

    <a class="app-card" href="examer1.html">
      <div class="app-icon">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 4V1L8 5l4 4V6a6 6 0 1 1-6 6H4a8 8 0 1 0 8-8z" fill="#2ecc9a"/>
        </svg>
      </div>
      <div class="app-name">examer1</div>
      <div class="app-desc">pdf를 한글로</div>
    </a>

    <div class="app-card" onclick="document.getElementById('pdfModal').classList.add('open')">
      <div class="app-icon">🔄</div>
      <div class="app-name">pdf 변환기</div>
      <div class="app-desc">pdf를 hwp로 일괄변환</div>
    </div>

  </div>

  <!-- pdf 변환기 modal -->
  <div class="modal-backdrop" id="pdfModal" onclick="if(event.target===this)this.classList.remove('open')">
    <div class="modal">
      <button class="modal-close" onclick="document.getElementById('pdfModal').classList.remove('open')">✕</button>
      <h2>pdf 변환기</h2>
      <a href="https://blog.kakaocdn.net/dna/c42ri2/dJMcagSMxRF/AAAAAAAAAAAAAAAAAAAAABiHw_cuv6TCRHDUv5MdRluuAs9ClQG9S8JaTsGyGqLU/hwp_to_pdf_oneclick-v1.0.0.exe?credential=yqXZFxpELC7KVnFOS48ylbz2pIh7yKj8&expires=1777561199&allow_ip=&allow_referer=&signature=fU%2BSuSL6ARI%2F3zLap1Uj6RwAY8A%3D&attach=1&knm=tfile.exe" download>⬇ hwp_to_pdf_oneclick.exe 다운</a>
      <a href="https://ligh1.tistory.com/204" target="_blank">📖 사용법</a>
    </div>
  </div>

</body>
</html>
